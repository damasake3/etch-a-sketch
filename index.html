<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="flex-container sketch-box"></div>

    <div class="flex-container" style="flex-direction: column; flex-grow: 1;">
        <h1 style="text-align: center;">Etch-A-Sketch</h1>

        <div class="flex-container" style="flex-direction: column; gap: 10px;">

            <form>
                <label for="range">Set Range:</label>
                <input type="number" id="range" name="range">
                <button type="button" class="btn" onclick="generateSquares(range.value)">Submit</button>
                <div id="rangeMsg"></div>
            </form>

            <h3 style="margin: 0px;">Color Options:</h3>

            <div id="menu">
                <button class="btn option" id="blackBtn">Black</button>
                <button class="btn option" id="rgbBtn">RGB </button>
                <button class="btn option" id="normalBtn">Normal</button>
            </div>

        </div>

    </div>
    <script src="js.js"></script>
</body>

</html>
